<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Recognition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background"></div>

  <div class="container">
    <h1>🤖 AI Image Recognition</h1>

    <div class="upload-card">
      <label class="file-label" for="imageInput">Choose Image</label>
      <input type="file" id="imageInput" accept="image/*">
      <button id="uploadBtn">Analyze Image</button>
     

    </div>
    <img id="preview" alt="Uploaded image" style="max-width:100%; border-radius:12px; margin-bottom:15px; display:none;">


    <div class="results-card">
      <h2>Analysis Results</h2>
      <ul id="resultsList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
